apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: allmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: auth-service
          image: 646596232446.dkr.ecr.ap-northeast-2.amazonaws.com/auth-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: CONFIG_SERVER_URI
              value: "http://config-server:8888"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "10.0.1.146:19092,10.0.1.146:19093,10.0.1.146:19094"
            - name: REDIS_SENTINEL_NODES
              value: "10.0.1.146:26379,10.0.1.146:26380,10.0.1.146:26381"
            - name: REDIS_MASTER_NAME
              value: "mymaster"
            - name: DB_HOST
              value: "10.0.1.90"
            - name: DB_PORT
              value: "3309"
            - name: DB_NAME
              value: "authdb"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: password
            - name: RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-rsa-secret
                  key: private-key
            - name: TEMPO_ENDPOINT
              value: "http://43.200.2.221:4318/v1/traces"
            - name: LOKI_URL
              value: "http://43.200.2.221:3100/loki/api/v1/push"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 200
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 200
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: allmart
spec:
  selector:
    app: auth-service
  ports:
    - port: 8082
      targetPort: 8082
